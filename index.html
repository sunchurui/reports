<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调研报告索引 · Reports</title>
<style>
  :root {
    --bg: #fafaf7;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e5e3dc;
    --accent: #b5651d;
    --accent-soft: #fff4e6;
    --tag-bg: #f0ede4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.65;
    font-size: 16px;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }
  header {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 24px;
    margin-bottom: 36px;
  }
  header h1 {
    font-size: 32px;
    margin: 0 0 12px 0;
    letter-spacing: -0.02em;
  }
  header p {
    color: var(--muted);
    margin: 0;
    font-size: 15px;
  }
  .stats {
    display: flex;
    gap: 28px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
  }
  .stats strong { color: var(--accent); font-size: 18px; }
  .stats div { display: flex; flex-direction: column; gap: 2px; }
  #reports-list { display: flex; flex-direction: column; gap: 20px; }
  .report-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px 28px;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .report-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(181, 101, 29, 0.08);
    transform: translateY(-1px);
  }
  .report-card .date {
    font-size: 12px;
    color: var(--muted);
    font-family: "SF Mono", Monaco, monospace;
    letter-spacing: 0.04em;
  }
  .report-card h2 {
    font-size: 20px;
    margin: 8px 0 12px 0;
    color: var(--ink);
    line-height: 1.35;
  }
  .report-card .summary {
    color: #333;
    font-size: 14px;
    line-height: 1.7;
    margin: 0 0 14px 0;
  }
  .report-card .meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }
  .report-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .report-card .tag {
    background: var(--tag-bg);
    color: #553311;
    padding: 2px 9px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .report-card .badge {
    color: var(--accent);
    font-weight: 600;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    background: var(--panel);
    border-radius: 8px;
    border: 1px dashed var(--line);
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>调研报告索引</h1>
    <p>由 Claude Code autopilot 自主调研生成。每份报告独立成页，按时间倒序排列。</p>
    <div class="stats">
      <div><strong id="stat-count">—</strong><span>报告数</span></div>
      <div><strong id="stat-sources">—</strong><span>累计信息源</span></div>
      <div><strong id="stat-chars">—</strong><span>累计字数</span></div>
    </div>
  </header>

  <main id="reports-list">
    <div class="empty">加载中…</div>
  </main>

  <footer>
    <p>仓库：<a href="https://github.com/sunchurui/reports">github.com/sunchurui/reports</a> · 用 <a href="https://github.com/anthropics/claude-code">Claude Code</a> autopilot 自动生成</p>
  </footer>

</div>

<script>
  fetch('reports.json')
    .then(r => r.json())
    .then(reports => {
      reports.sort((a, b) => b.date.localeCompare(a.date));

      document.getElementById('stat-count').textContent = reports.length;
      document.getElementById('stat-sources').textContent =
        reports.reduce((s, r) => s + (r.sources || 0), 0);
      document.getElementById('stat-chars').textContent =
        reports.reduce((s, r) => s + (r.chars || 0), 0).toLocaleString();

      const list = document.getElementById('reports-list');
      if (reports.length === 0) {
        list.innerHTML = '<div class="empty">还没有报告。运行一次 <code>/autopilot</code> 试试。</div>';
        return;
      }

      list.innerHTML = reports.map(r => `
        <a class="report-card" href="reports/${r.slug}/">
          <div class="date">${r.date}</div>
          <h2>${r.title}</h2>
          <p class="summary">${r.summary}</p>
          <div class="meta">
            <div class="tags">
              ${(r.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            ${r.sources ? `<span class="badge">${r.sources} 源</span>` : ''}
            ${r.chars ? `<span>${r.chars.toLocaleString()} 字</span>` : ''}
          </div>
        </a>
      `).join('');
    })
    .catch(err => {
      document.getElementById('reports-list').innerHTML =
        '<div class="empty">加载失败：' + err.message + '</div>';
    });
</script>

</body>
</html>
